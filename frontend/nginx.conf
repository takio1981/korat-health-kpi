# === Production Nginx Config สำหรับ 500 concurrent users ===

# Worker connections
# worker_processes auto; (set in main nginx.conf)

server {
    listen 8881;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # === Performance ===
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_max_body_size 20m;

    # === Gzip Compression (ลด bandwidth 60-80%) ===
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # === Security Headers ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # เปิดเมื่อใช้ HTTPS

    # === Redirect root to /khupskpi/ ===
    location = / {
        return 301 /khupskpi/;
    }

    # === Proxy API requests to Backend ===
    location ^~ /khupskpi/api {
        proxy_pass http://backend:8830;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeout สำหรับ heavy queries (export, summary refresh)
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffer สำหรับ response ขนาดใหญ่
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }

    # === Cache static assets (1 ปี สำหรับ hashed files) ===
    location ~* \.(?:css|js|ico|jpg|jpeg|png|gif|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # === Angular SPA routing ===
    location /khupskpi/ {
        try_files $uri $uri/ /khupskpi/index.html;

        # Cache HTML สั้น (เพื่อให้ deploy ใหม่แล้วเห็นทันที)
        location ~* \.html$ {
            expires 1h;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }
}
