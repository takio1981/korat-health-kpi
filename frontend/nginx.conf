server {
    listen 8881;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Redirect root to /khupskpi/
    location = / {
        return 301 /khupskpi/;
    }

    # Proxy API requests to Backend service
    # ใช้ ^~ เพื่อให้มี priority สูงกว่า regex (static assets)
    # ป้องกัน request อย่าง /khupskpi/api/export.js ถูกจับผิด block
    location ^~ /khupskpi/api {
        proxy_pass http://backend:8830;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cache static assets (CSS, JS, images, fonts)
    location ~* \.(?:css|js|ico|jpg|jpeg|png|gif|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Angular SPA routing - fallback ทุก path ที่ไม่ match ไปที่ index.html
    location /khupskpi/ {
        try_files $uri $uri/ /khupskpi/index.html;
    }
}
