<div class="p-4 sm:p-6">

  <!-- Header -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-5">
    <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2 mb-1">
      <i class="fas fa-layer-group text-indigo-600"></i>
      จัดการข้อมูล KPI
    </h3>
    <p class="text-xs text-gray-500">เปรียบเทียบ Structure กับ HDC → สร้างแบบฟอร์ม → Export ข้อมูล</p>
  </div>

  <!-- Tabs -->
  <div class="flex gap-1 mb-5 bg-gray-100 p-1 rounded-xl">
    <button (click)="activeTab = 'db-compare'" class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg text-sm font-bold transition-all"
            [ngClass]="activeTab === 'db-compare' ? 'bg-white text-indigo-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'">
      <i class="fas fa-database"></i>
      <span class="hidden sm:inline">DB Compare</span>
      <span class="sm:hidden">Compare</span>
    </button>
    <button (click)="activeTab = 'form-builder'" class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg text-sm font-bold transition-all"
            [ngClass]="activeTab === 'form-builder' ? 'bg-white text-purple-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'">
      <i class="fas fa-wpforms"></i>
      <span class="hidden sm:inline">สร้างแบบฟอร์ม</span>
      <span class="sm:hidden">ฟอร์ม</span>
    </button>
    <button (click)="activeTab = 'export'" class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg text-sm font-bold transition-all"
            [ngClass]="activeTab === 'export' ? 'bg-white text-green-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'">
      <i class="fas fa-file-export"></i>
      <span class="hidden sm:inline">Export ข้อมูล</span>
      <span class="sm:hidden">Export</span>
    </button>
    <button (click)="activeTab = 'report-compare'" class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg text-sm font-bold transition-all"
            [ngClass]="activeTab === 'report-compare' ? 'bg-white text-teal-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'">
      <i class="fas fa-exchange-alt"></i>
      <span class="hidden sm:inline">Report Compare</span>
      <span class="sm:hidden">Reports</span>
    </button>
  </div>

  <!-- Tab Content (ใช้ hidden แทน ngSwitch เพื่อไม่ destroy component — ข้อมูลจะค้างอยู่จนกว่าจะเปลี่ยนหน้า) -->
  <div [hidden]="activeTab !== 'db-compare'">
    <app-db-compare (createFormEvent)="onCreateFormFromHDC($event)"></app-db-compare>
  </div>
  <div [hidden]="activeTab !== 'form-builder'">
    <app-form-builder [hdcColumns]="hdcColumnsForForm" [hdcTableName]="hdcTableName" [hdcTrigger]="hdcTrigger"></app-form-builder>
  </div>
  <div [hidden]="activeTab !== 'export'">
    <app-export-kpi></app-export-kpi>
  </div>
  <div [hidden]="activeTab !== 'report-compare'">
    <app-report-compare></app-report-compare>
  </div>

</div>
