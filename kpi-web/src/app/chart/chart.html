<div class="p-6 relative">
      <!-- Loading Spinner Overlay -->
      <div *ngIf="isLoading" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-white/80 backdrop-blur-sm transition-opacity duration-300">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-green-600 mb-4"></div>
        <p class="text-green-800 font-bold text-lg animate-pulse">กำลังโหลดข้อมูล...</p>
      </div>

      <!-- Stats Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 mb-6 sm:mb-8">
        <div class="bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl shadow-lg p-4 sm:p-6 flex items-center transform hover:-translate-y-1 transition-all duration-300">
          <div class="p-3 sm:p-4 rounded-full bg-white/20 text-white mr-3 sm:mr-4 backdrop-blur-sm">
            <i class="fas fa-check-circle text-lg sm:text-2xl"></i>
          </div>
          <div>
            <p class="text-xs sm:text-sm font-medium text-emerald-100">ร้อยละความสำเร็จ KPI</p>
            <p class="text-xl sm:text-3xl font-bold text-white">{{ stats.successRate }}%</p>
          </div>
        </div>

        <div class="bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl shadow-lg p-4 sm:p-6 flex items-center transform hover:-translate-y-1 transition-all duration-300">
          <div class="p-3 sm:p-4 rounded-full bg-white/20 text-white mr-3 sm:mr-4 backdrop-blur-sm">
            <i class="fas fa-hospital text-lg sm:text-2xl"></i>
          </div>
          <div>
            <p class="text-xs sm:text-sm font-medium text-blue-100">หน่วยบริการที่บันทึกแล้ว</p>
            <p class="text-xl sm:text-3xl font-bold text-white">{{ stats.recordedCount }} <span class="text-sm sm:text-lg font-normal text-blue-200">/ {{ stats.totalDepts }}</span></p>
          </div>
        </div>

        <div class="bg-gradient-to-br from-orange-400 to-red-500 rounded-2xl shadow-lg p-4 sm:p-6 flex items-center transform hover:-translate-y-1 transition-all duration-300">
          <div class="p-3 sm:p-4 rounded-full bg-white/20 text-white mr-3 sm:mr-4 backdrop-blur-sm">
            <i class="fas fa-clock text-lg sm:text-2xl"></i>
          </div>
          <div>
            <p class="text-xs sm:text-sm font-medium text-orange-100">รอการตรวจสอบ</p>
            <p class="text-xl sm:text-3xl font-bold text-white">{{ stats.pendingCount }} <span class="text-xs sm:text-sm font-normal text-orange-200">รายการ</span></p>
          </div>
        </div>

        <div class="bg-gradient-to-br from-purple-500 to-indigo-600 rounded-2xl shadow-lg p-4 sm:p-6 flex items-center transform hover:-translate-y-1 transition-all duration-300">
          <div class="p-3 sm:p-4 rounded-full bg-white/20 text-white mr-3 sm:mr-4 backdrop-blur-sm">
            <i class="fas fa-trophy text-lg sm:text-2xl"></i>
          </div>
          <div>
            <p class="text-xs sm:text-sm font-medium text-purple-100">อันดับผลงานระดับเขต</p>
            <p class="text-xl sm:text-3xl font-bold text-white">อันดับ {{ stats.rank }}</p>
          </div>
        </div>
      </div>

      <!-- Filters Section -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 sm:p-6 mb-6 sm:mb-8">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 sm:gap-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">หมวดหมู่หลัก</label>
                <select [(ngModel)]="selectedMain" (change)="applyFilters()" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none text-sm">
                    <option value="">ทั้งหมด</option>
                    <option *ngFor="let cat of mainCategories" [value]="cat">{{ cat }}</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">เลือกตัวชี้วัด</label>
                <select [(ngModel)]="selectedIndicator" (change)="applyFilters()" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none text-sm">
                    <option value="">ทั้งหมด</option>
                    <option *ngFor="let name of indicatorNames" [value]="name">{{ name }}</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">เลือกหน่วยงาน</label>
                <select [(ngModel)]="selectedDept" (change)="applyFilters()" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none text-sm">
                    <option value="">ทั้งหมด</option>
                    <option *ngFor="let name of deptNames" [value]="name">{{ name }}</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">เลือกปี</label>
                <select [(ngModel)]="selectedYear" (change)="applyFilters()" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none text-sm">
                    <option value="">ทั้งหมด</option>
                    <option *ngFor="let name of filterYears" [value]="name">{{ name }}</option>
                </select>
            </div>
             <div class="flex items-end">
                <button (click)="selectedMain=''; selectedIndicator=''; selectedDept=''; selectedYear=''; applyFilters()" 
                        class="w-full py-2.5 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl text-sm transition-colors shadow-lg transform hover:-translate-y-0.5">
                  <i class="fas fa-times-circle mr-2"></i> ล้างตัวกรอง
                </button>
            </div>
        </div>
      </div>
        <!-- Bar Chart (Full Width) -->
      <div *ngIf="!isLoading" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-8">
        <apx-chart
          [series]="barChartOptions.series"
          [chart]="barChartOptions.chart"
          [dataLabels]="barChartOptions.dataLabels"
          [plotOptions]="barChartOptions.plotOptions"
          [yaxis]="barChartOptions.yaxis"
          [legend]="barChartOptions.legend"
          [fill]="barChartOptions.fill"
          [stroke]="barChartOptions.stroke"
          [tooltip]="barChartOptions.tooltip"
          [xaxis]="barChartOptions.xaxis"
          [colors]="barChartOptions.colors"
          [title]="barChartOptions.title"
        ></apx-chart>
      </div>
      <div *ngIf="!isLoading" class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6 mb-6 sm:mb-8">
        <!-- Line Chart -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
          <apx-chart
            [series]="trendChartOptions.series"
            [chart]="trendChartOptions.chart"
            [xaxis]="trendChartOptions.xaxis"
            [yaxis]="trendChartOptions.yaxis"
            [dataLabels]="trendChartOptions.dataLabels"
            [tooltip]="trendChartOptions.tooltip"
            [stroke]="trendChartOptions.stroke"
            [colors]="trendChartOptions.colors"
            [labels]="trendChartOptions.labels"
            [title]="trendChartOptions.title"
          ></apx-chart>
        </div>
        <!-- กราฟวงกลม -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
          <apx-chart
            [series]="pieChartOptions.series"
            [chart]="pieChartOptions.chart"
            [labels]="pieChartOptions.labels"
            [dataLabels]="pieChartOptions.dataLabels"
            [tooltip]="pieChartOptions.tooltip"
            [responsive]="pieChartOptions.responsive"
            [title]="pieChartOptions.title"
          ></apx-chart>
        </div>
      </div>
</div>
