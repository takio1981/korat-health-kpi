<div class="p-4 sm:p-6">
      <!-- Filter Tabs + Mark All -->
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 gap-3">
        <div class="flex gap-2 flex-wrap">
          <button (click)="setFilter('all')" class="px-4 py-2 rounded-xl text-xs font-bold transition-all"
                  [ngClass]="activeFilter === 'all' ? 'bg-green-600 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'">
            ทั้งหมด ({{ notifications.length }})
          </button>
          <button (click)="setFilter('unread')" class="px-4 py-2 rounded-xl text-xs font-bold transition-all"
                  [ngClass]="activeFilter === 'unread' ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'">
            ยังไม่อ่าน ({{ unreadNotifCount }})
          </button>
          <button (click)="setFilter('approve')" class="px-4 py-2 rounded-xl text-xs font-bold transition-all"
                  [ngClass]="activeFilter === 'approve' ? 'bg-emerald-600 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'">
            <i class="fas fa-check-circle mr-1"></i>อนุมัติ ({{ approveCount }})
          </button>
          <button (click)="setFilter('reject')" class="px-4 py-2 rounded-xl text-xs font-bold transition-all"
                  [ngClass]="activeFilter === 'reject' ? 'bg-red-500 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'">
            <i class="fas fa-undo-alt mr-1"></i>ตีกลับ ({{ rejectCount }})
          </button>
        </div>
        <button *ngIf="unreadNotifCount > 0" (click)="markAllAsRead()" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-xs font-bold transition-all shadow-md">
          <i class="fas fa-check-double mr-1"></i> อ่านทั้งหมด
        </button>
      </div>

      <!-- Loading -->
      <div *ngIf="isLoading" class="flex items-center justify-center py-16">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-green-200 border-t-green-600"></div>
      </div>

      <!-- Empty State -->
      <div *ngIf="!isLoading && filteredNotifications.length === 0" class="bg-white rounded-2xl shadow-sm p-12 text-center">
        <i class="fas fa-bell-slash text-5xl text-gray-300 mb-4"></i>
        <p class="text-gray-400 text-lg font-medium">ไม่มีการแจ้งเตือน</p>
        <p class="text-gray-300 text-sm mt-1">เมื่อมีการอนุมัติหรือตีกลับ KPI จะแสดงที่นี่</p>
      </div>

      <!-- Notification List -->
      <div *ngIf="!isLoading && filteredNotifications.length > 0" class="space-y-2">
        <div *ngFor="let notif of filteredNotifications"
             (click)="markAsRead(notif)"
             class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition-all cursor-pointer"
             [ngClass]="notif.is_read ? 'opacity-75' : 'border-l-4 border-l-blue-500'">
          <div class="flex items-start gap-3">
            <!-- Icon -->
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0"
                 [ngClass]="notif.type === 'approve' ? 'bg-green-100' : notif.type === 'reject' ? 'bg-red-100' : 'bg-blue-100'">
              <i class="fas text-lg"
                 [ngClass]="notif.type === 'approve' ? 'fa-check-circle text-green-600' : notif.type === 'reject' ? 'fa-undo-alt text-red-500' : 'fa-info-circle text-blue-500'"></i>
            </div>
            <!-- Content -->
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between gap-2">
                <h4 class="text-sm font-bold text-gray-800">{{ notif.title }}</h4>
                <span *ngIf="!notif.is_read" class="h-2.5 w-2.5 rounded-full bg-blue-500 shrink-0"></span>
              </div>
              <p class="text-sm text-gray-600 mt-1">{{ notif.message }}</p>
              <div class="flex items-center gap-3 mt-2">
                <span class="text-xs text-gray-400">
                  <i class="fas fa-clock mr-1"></i>{{ getTimeAgo(notif.created_at) }}
                </span>
                <span class="text-xs text-gray-400">{{ notif.created_at | date:'dd/MM/yyyy HH:mm' }}</span>
                <span *ngIf="notif.created_by_name" class="text-xs text-gray-400">
                  <i class="fas fa-user mr-1"></i>{{ notif.created_by_name }} {{ notif.created_by_lastname }}
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
</div>
