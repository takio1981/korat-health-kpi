services:
  # Backend API Service (Node.js)
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: khups_kpi_backend
    restart: always
    ports:
      - "8830:8830"
    environment:
      PORT: 8830
      NODE_ENV: production
      DB_HOST: host.docker.internal
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_URL: ${APP_URL:-}
      HDC_DB_HOST: ${HDC_DB_HOST:-}
      HDC_DB_PORT: ${HDC_DB_PORT:-3306}
      HDC_DB_NAME: ${HDC_DB_NAME:-hdc}
      HDC_DB_USER: ${HDC_DB_USER:-}
      HDC_DB_PASSWORD: ${HDC_DB_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kpi_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8830/khupskpi/api/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Frontend Service (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: khups_kpi_frontend
    restart: always
    ports:
      - "8881:8881"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kpi_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  kpi_network:
    driver: bridge
