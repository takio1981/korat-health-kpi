services:
  # Backend API Service (Node.js + PM2)
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: khups_kpi_backend
    restart: always
    ports:
      - "8830:8830"
    environment:
      PORT: 8830
      # host.docker.internal resolves to host machine IP automatically (Docker Desktop)
      # DB_HOST in .env is IGNORED — container always reaches the host via host.docker.internal
      DB_HOST: host.docker.internal
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kpi_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8830/khupskpi/api/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Frontend Service (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: khups_kpi_frontend
    restart: always
    ports:
      - "8881:8881"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kpi_network

networks:
  kpi_network:
    driver: bridge
